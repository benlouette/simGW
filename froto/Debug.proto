/**
 * @file    Debug.proto
 * @author  Xiaoyuan (Sean) Ma (ZZ2134)
 * @date    2023-03-20
 * @brief   Define messages for debug
 * @details The configuration related interaction is designed based on Froto.
 * 1) DebugMessage: To send debug message to the peed or to the sensor. 
 *    Candidate primitives: "simple upload", "reliable upload" "simple disseminate",
 *    or "reliable disseminate"
 * Current version: 1.0, appVer = 1
 * ChangeLog:
 * V1.0  | 2023-03-11 | Xiaoyuan (Sean) Ma | Draft
 */

syntax="proto3";

import "Common.proto";
import "Froto.proto";

package SKFChina.Debug;

message DebugMsgUniversal {
    // In the current design: field number 2 have been used.

    // Unix timestamp, 0 time zone, unit is ms
    optional uint64        time = 1;
    bytes                  message_content = 2;
}

message DebugMetric {
    // In the current design: field number 3 have been used.

    // Unix timestamp, 0 time zone, unit is ms
    optional uint64        time = 1;
    uint32                 MetricId = 2;
    bytes                  message_content = 3;
}

message DebugMessage {
    // In the current design: field numbers 1 - 7 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    // The type of product
    SKFChina.Common.ProductType     product = 4;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 5;
    repeated DebugMsgUniversal      debug_message = 6;
    repeated DebugMetric            debug_metric = 7;
}
