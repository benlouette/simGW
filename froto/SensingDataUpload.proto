/**
 * @file    SensingDataUpload.proto
 * @author  Xiaoyuan (Sean) Ma (ZZ2134)
 * @date    2023-03-11
 * @brief   Define messages for sensing data upload
 * @details The sensing data upload is designed based on Froto. 
 * 1) DataSelectionDisseminate: to select the data in the sensor. 
 *    Candidate primitives: "reliable disseminate", "simple disseminate", 
 *    and "simple retrieve"
 * 2) DataUpload: to upload (selected) data.
 *    Candidate primitives: "simple upload", "reliable upload", "simple bulk upload", 
 *    "reliable bulk upload", and "simple retrieve"
 * Current version: 1.0g, appVer = 1
 * ChangeLog:
 * V1.0  | 2023-03-11 | Xiaoyuan (Sean) Ma | Draft
 * V1.0a | 2023-07-03 | Xiaoyuan (Sean) Ma | 1. Add memory_id in Measurement.
 * V1.0b | 2023-07-12 | Xiaoyuan (Sean) Ma | 1. Add message alarm_or_notify in Measurement.
 * V1.0c | 2023-08-03 | Xiaoyuan (Sean) Ma | 1. Add sample rate and sample period in Measurement.
 * V1.0d | 2023-08-24 | Xiaoyuan (Sean) Ma | 1. Add dimension in Measurement. 
 * V1.0e | 2023-11-23 | Xiaoyuan (Sean) Ma | 1. Add mac_address, iccid, and imei in Measurement.
 * V1.0f | 2024-04-17 | Xiaoyuan (Sean) Ma | 1. Change the "enum" type of measure_type and sensor
 *                                              in DataSelectionDisseminate to "message" to make it
 *                                              compatible with Java.
 * V1.0g | 2025-05-12 | Xiaoyuan (Sean) Ma | 1. Add dimension in MeasurementTypeMsg.
 */

syntax="proto3";

import "Common.proto";
import "Froto.proto";

package SKFChina.SensingDataUpload;

// Alarm and notify information: event + the numbers of events over 1 month and 3 months
message AlarmAndNotifyInfo {
    // In the current design: field numbers 1 - 3 have been used.
    SKFChina.Common.AlarmAndNotify  measurement = 1;
    uint32                          amount_over_30_days = 2;
    uint32                          amount_over_90_days = 3;
}

// measurement
message Measurement {
    // In the current design: field numbers 1 - 21 have been used.

    // The type of measurement: what the sensing data represents
    SKFChina.Common.MeasurementType         measure_type = 1;
    // The type of sensor: if the data is sampled by an individual sensor, this field can be filled.
    // Otherwise, no need to fill this field
    optional SKFChina.Common.SensorType     sensor = 2;
    // The type of product
    SKFChina.Common.ProductType             product= 3;
    // The range of the sensor (if applicable)
    optional SKFChina.Common.Range          range = 4;
    // The unit of the data
    optional SKFChina.Common.Unit           unit = 5;
    // Sample rate (in Hz) of the data (e.g., vibration)
    optional float                          sample_rate_hz = 16;
    // Sample period (in S) of the data (e.g., temperature)
    optional uint32                         sample_period_s = 17;
    // Dimension mask to indicate which axis (or axes) used：SKFChina.Common.Dimension
    optional uint32                         dimension = 18;
    // The length (points) of a measurement: how many points are in this measurement
    // For instance, given a measurement of @p TEMPERATURE_CURRENT,  @p measure_length is 1 because 
    // there is only one temperature point.
    // Given a measurement of @p VIBRATION_ENV3_RMS, @p measure_length is the length of the vibration
    // measurement rather than the length of the rms (i.e., 1 byte).
    optional uint32                         measure_length_sample = 6;
    // The length (points) of the data: how many points are in the uploaded data totally (not just the current packets)
    // For instance, for a measurement of @p TEMPERATURE_HISTORY, @p measure_length is 1 but @p total_data_length
    // is the total length of the history (e.g., 256 history temperature sample points) even the history requires packet
    // split.
    optional uint32                         total_data_length_sample = 7;
    // The sequence number of a measurement: cyclic increasing 1 for each measurement.
    // For instance, a sensor performs a vibration measurement and based on this measurement env 3 is calculated.
    // In this case, @p VIBRATION_ACC_WAVE and @p VIBRATION_ENV3_WAVE have the same @p measure_seq_no.
    uint32                                  measure_seq_no = 8;
    // The data format: for instance, uint32_t or int16_t.
    SKFChina.Common.Format                  data_format = 9;
    // check value of the whole data (if the data is sent with multiple packets).
    optional uint32                         crc32_value = 10;
    // Encryption: indicate which encryption is adopted for @p Data.data.
    optional SKFChina.Common.Encryption     encryp = 11;
    // The sensor ID: considering future applications with a gateway
    bytes                                   sensor_id = 12;
    // The moment of measurement (unix timestamp, 0 time zone, unit is ms)
    uint64                                  sample_time = 13;
    // Memory ID
    optional int32                          memory_id = 14;
    // This field is required only if it is an alarm or notification
    optional AlarmAndNotifyInfo             alarm_or_notify = 15;
    
    // Communication stuffs: if measure_type is a communication-related metric, then the followings are expected
    // For the devices with BLE or IEEE 802.15.4 transceivers
    optional bytes          mac_address = 19;
    // For the devices with cellular modules
    optional bytes          iccid = 20;
    // For the devices with cellular modules
    optional bytes          imei = 21;
}

// Measurement data
message Data {
    // In the current design: field numbers 1 - 3 have been used.

    // Start point of the data: for instance, given a piece of waveform (with 256 points), this field is set to 0 for the 
    // first packet. Assuming up to 128 samples can be sent within a packet, then the waveform is required packet split.
    // For the sencond packet, the start point is required to set to 128, because 0th - 127th samples have already been sent.
    uint32            start_point = 1;
    bytes             data = 2;
    // check value of the data
    uint32            crc32_value = 3;
}

// Data pair: Measurement + Data
message DataPair {
    // In the current design: field numbers 1 - 2 have been used.

    // For long data (i.e., packet split is required), only the first packet, @p measurement is required
    // For short data (i.e., no packet split is required), @p measurement is required
    optional Measurement        measurement = 1;
    Data                        measurement_data = 2;
}

message MeasurementTypeMsg {
    // In the current design: field numbers 1 - 2 have been used.
    SKFChina.Common.MeasurementType measure_type = 1;
    // Dimension mask to indicate which axis (or axes) used：SKFChina.Common.Dimension
    optional uint32 dimension = 2;
}

message SensorTypeMsg {
    // In the current design: field numbers 1 has been used.
    SKFChina.Common.SensorType sensor = 1;
}

// To select data (of given measurement type, given period, and given sensor), 
// then the sensor would upload them
// If @p sample_time_start and @p sample_time_end are both set to zeros, no selection is enabled.
message DataSelectionDisseminate {
    // In the current design: field numbers 1 - 9 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    // The type of measurement
    repeated MeasurementTypeMsg     measure_type = 4;
    // The type of sensor: if the data is sampled by sensors (not fused data), this field can be filled.
    // Otherwise, no need to fill this field
    repeated SensorTypeMsg          sensor = 5;
    // The type of product
    SKFChina.Common.ProductType     product= 6;
    // The data is sampled in the time [sample_time_start, sample_time_end]
    uint64                          sample_time_start = 7;
    uint64                          sample_time_end = 8;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 9;
}

// Sensing data uploading message (according to data selection)
// For a long payload (e.g., a piece of waveform), one can send a @p measurement first to notify the peer what the 
// following data is. Then, multiple @p measurement_data can be sent. The fields (i.e., @p total_block and 
// @p current_blocks) in @p header can be used to indicate how to recover the payload when multiple (splitted)
// packets received.
message DataUpload {
    // In the current design: field numbers 1 - 4 have been used.

    SKFChina.Froto.FrotoHeader  header = 1;
    // Application version: so far the supported version is 1
    uint32                      appVer = 2;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool               is_big_endian = 3;
    // Data: can be multiple types of measurement
    repeated DataPair           data_pair = 4;
}