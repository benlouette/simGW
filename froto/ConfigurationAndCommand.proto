/**
 * @file    ConfigurationAndCommand.proto
 * @author  Xiaoyuan (Sean) Ma (ZZ2134)
 * @date    2023-03-15
 * @brief   Define messages for configuration
 * @details The configuration related interaction is designed based on Froto.
 * 1) ConfigRetrieve: to retrieve the current configuration. 
 *    Candidate primitives: "simple retrieve"
 * 2) ConfigHashUpload: to upload the hash value of all the configuration items.
 *    Candidate primitives: "simple retrieve" (as a reply of ConfigRetrieve), "simple upload", 
 *    or "reliable upload".
 * 3) SpecificConfigUpload: to upload specific configuration items.
 *    Candidate primitives: "simple retrieve" (as a reply of ConfigRetrieve).
 * 4) ConfigDisseminate: to disseminate the configuration.
 *    Candidate primitives: "simple disseminate", "reliable disseminate", "simple bulk 
 *    disseminate", and "reliable bulk disseminate".
 * 5) CommandDisseminate: to disseminate the command.
 *    Candidate primitives: "simple disseminate", "reliable disseminate", "simple bulk 
 *    disseminate", and "reliable bulk disseminate".
 * Current version: 1.0n, appVer = 1
 * ChangeLog:
 * V1.0  | 2023-03-15 | Xiaoyuan (Sean) Ma | Draft
 * V1.0a | 2023-07-01 | Xiaoyuan (Sean) Ma | 1. Saperate fscheduler related parameters 
 *                                              from specific configuration:
 *                                              a) Add FSCHEDULER_CURRENT_CONFIG in 
 *                                              RetrievePayload
 *                                              b) Add fscheduler_config_item in 
 *                                              ConfigRetrieve
 *                                              c) Add fscheduler_config_item in 
 *                                              ConfigPair
 *                                           2. Add DescConfigPair and Replace 
 *                                              SKFChina.Common.Wsdesc with DescConfigPair
 *                                              to describe sensing better
 *                                           3. Add general_config_content_uint32, 
 *                                              general_config_content_int32, and 
 *                                              general_config_content_float in ConfigPair
 * V1.0b | 2023-07-03 | Xiaoyuan (Sean) Ma | 1. Add memory_id in DescConfigPair, ConfigPair, and 
 *                                              ConfigRetrieve.
 * V1.0c | 2023-09-13 | Xiaoyuan (Sean) Ma | 1. Revise DescConfigPair: 
 *                                              a) Remove measurement_description in 
 *                                              DescConfigPair
 *                                              b) Replace id with time as the index in 
 *                                              DescConfigPair
 *                                           2. Optimize command_para in CommandPair: change the 
 *                                              type from bytes to oneof
 * V1.0d | 2023-12-12 | Xiaoyuan (Sean) Ma | 1. Add WorkModePair.
 *                                           2. Add work_mode_content to config_content of 
 *                                              ConfigPair.
 * V1.0e | 2023-12-21 | Xiaoyuan (Sean) Ma | 1. Add TimeArrayElement and BoolArrayElement.
 *                                           2. Repace elements in TimeArray and BoolArray with 
 *                                              TimeArrayElement and BoolArrayElement to be compatible 
 *                                              with nanopb-based C language implementation.
 * V1.0f | 2023-12-25 | Xiaoyuan (Sean) Ma | 1. Revise DescConfigPair by adding DescConfigPairMetric 
 *                                              to make protocol hierarchy is clear.
 * V1.0g | 2024-03-07 | Xiaoyuan (Sean) Ma | 1. Add general_config_content_bool in config_content of 
 *                                              DescConfigPairMetric and ConfigPair.
 *                                           2. Revise config_pair to command_pair in 
 *                                              CommandDisseminate.
 *                                           3. Create GatewayInfoPair and add gateway_info_content to 
 *                                              ConfigPair.
 * V1.0h | 2024-03-14 | Xiaoyuan (Sean) Ma | 1. Add GATEWAY_CONFIG_FILE_CONFIG and SENSOR_CONFIG_FILE_CONFIG
 *                                              to RetrievePayload.
 *                                           2. Modify type of name_id in GatewayInfoPair (from bytes) to 
 *                                              uint32.
 * V1.0i | 2024-04-17 | Xiaoyuan (Sean) Ma | 1. Change the "enum" type of specific_config_item and 
 *                                              fscheduler_config_item in ConfigRetrieve to "message" to make
 *                                              it compatible with Java.
 * V1.0j | 2024-04-29 | Xiaoyuan (Sean) Ma | 1. Add httpPostUrl in ConfigRetrieve to support a temporary URL.
 * V1.0k | 2024-05-16 | Xiaoyuan (Sean) Ma | 1. Add last_edit_time to ConfigHashUpload.
 * V1.0l | 2024-05-28 | Xiaoyuan (Sean) Ma | 1. Add name_id to ConfigRetrieve.
 * V1.0m | 2024-11-18 | Xiaoyuan (Sean) Ma | 1. Add config_hash_bitmap and config_hash_len_byte to ConfigHashUpload.
 *                                           2. Add MqttSecTypePair and add mqtt_sec_type to ConfigPair.
 *                                           3. Add IpAddr and add ip_addr to ConfigPair.
 *                                           4. Add ChildrenList and add children_list to ConfigPair.
 * V1.0n | 2025-01-13 | Xiaoyuan (Sean) Ma | 1. Add description to ChildNode.
 */

syntax="proto3";

import "Common.proto";
import "Froto.proto";

package SKFChina.ConfigurationAndCommand;

// What to retrieve
enum RetrievePayload {
    // 0 - 5 used
    UNKNOWN_RETRIEVE            = 0;
    CURRENT_CONFIG_HASH         = 1;
    SPECIFIC_CURRENT_CONFIG     = 2;
    FSCHEDULER_CURRENT_CONFIG   = 3;
    GATEWAY_CONFIG_FILE_CONFIG  = 4;
    SENSOR_CONFIG_FILE_CONFIG   = 5;
}

message SpecificConfigItemMsg {
    // In the current design: field numbers 1 has been used.
    SKFChina.Common.SpecificConfigItem specific_config_item = 1;
}

message fSchedulerConfigItemMsg {
    // In the current design: field numbers 1 has been used.
    SKFChina.Common.fSchedulerConfigItem fscheduler_config_item = 1;
}

// To retrieve the current configuration
message ConfigRetrieve {
    // In the current design: field numbers 1 - 10 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    // The corresponding name id of the sensor
    optional uint32                 name_id = 10;
    RetrievePayload                 payload = 4;
    // Only required when @p payload is SPECIFIC_CURRENT_CONFIG
    repeated SpecificConfigItemMsg     specific_config_item = 5;
    // Only required when @p payload is FSCHEDULER_CURRENT_CONFIG
    repeated fSchedulerConfigItemMsg   fscheduler_config_item = 7;
    // Memory ID
    optional int32                  memory_id = 8;

    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 6;
    
    // The HTTP POST address 
    optional bytes                  httpPostUrl = 9;
}

// The retrieve reply for @p CURRENT_CONFIG_HASH or upload directly the current configuration hash
message ConfigHashUpload {
    // In the current design: field numbers 1 - 9 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    // The type of product
    SKFChina.Common.ProductType     product= 4;
    // hash value of all the configuration items (required by a specific application): elf hash adopted.
    uint32                          config_hash_value = 5;
    // hash value bitmap: corresponding bit setting to "1" indicates the configure item would be calculated
    // All item would be calculated if abscent
    optional bytes                  config_hash_bitmap = 8;
    // The bitmap length (in bytes)
    // All item would be calculated if abscent
    optional uint32                 config_hash_len_byte = 9;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 6;
    optional TimeArrayElement       last_edit_time = 7;
}

// The retrieve reply for @p SPECIFIC_CURRENT_CONFIG
// If the retrived configuration items are too much, only first retrieved items (which can be contained in
// a packet) can be replied.
message SpecificConfigUpload {
    // In the current design: field numbers 1 - 6 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    // The type of product
    SKFChina.Common.ProductType     product = 4;
    // Configuration pair
    repeated ConfigPair             config_pair = 5;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 6;
}

message TimeArrayElement
{
    // In the current design: field number 1 has been used.

    // Unix timestamp, 0 time zone, unit is ms
    uint64                          time = 1;
}

message TimeArray {
    // In the current design: field number 1 has been used.
    repeated TimeArrayElement       time = 1;
}

message BoolArrayElement
{
    // In the current design: field number 1 has been used.
    bool                            YesOrNo = 1;
}

message BoolArray {
    // In the current design: field number 1 has been used.
    repeated BoolArrayElement       YesOrNo = 1;
}

message WorkModePair {
    // In the current design: field numbers 1 - 2 have been used.
    SKFChina.Common.WorkMode        work_mode = 1;
    bytes                           parameter = 2;
}

message GatewayInfoPair {
    // In the current design: field numbers 1 - 2 have been used.
    bytes                           mac_address = 1;
    uint32                          name_id = 2;
}

message DescConfigPairMetric {
    // In the current design: field numbers 2 - 4, 5 - 11 have been used.
    // time is used to find the corresponding element in wsarray
    SKFChina.Common.SpecificConfigItem    specific_config_item = 2;
    // Memory ID
    optional int32                        memory_id = 10;
    oneof config_content{
        bytes                             general_config_content = 3;
        TimeArray                         time_config_content = 4;
        BoolArray                         bool_config_content = 6;
        uint32                            general_config_content_uint32 = 7;
        int32                             general_config_content_int32 = 8;
        float                             general_config_content_float = 9;
        bool                              general_config_content_bool = 11;
    }
}

message DescConfigPair {
    // In the current design: field numbers 1 - 2 have been used.
    uint64                                time = 1;
    repeated DescConfigPairMetric         metric = 2;
}

message MqttSecTypePair {
    // In the current design: field numbers 1 - 2 have been used.
    SKFChina.Common.CloudBackendMqttSecType secType = 1;
    bytes                                   parameter = 2;
}

message IpAddr {
    // In the current design: field numbers 1 - 2 have been used.
    bool                                  isIpv4 = 1;
    bytes                                 addr = 2;
}

message ChildNode {
    // In the current design: field numbers 1 - 9 have been used.
    uint32 order          = 1;
    uint32 totalChildren  = 2;
    optional bytes    type  = 3;
    optional bytes    manufacturer = 4;
    optional bytes    name  = 5;
    uint32          nameId = 6;
    optional bytes    BLESensorName = 7;
    bytes             macAddr = 8;
    bytes             description = 9;
}

message ChildrenList {
    // In the current design: field number 1 has been used.

    repeated ChildNode child = 1;
}

// For fScheduler
message WakeUpToSenseDesc {
    // In the current design: field number 1 has been used.

    // Description for wake-up-to-sense (for fScheduler)
    repeated DescConfigPair     description = 1;
}

message ConfigPair {
    // In the current design: field numbers 1 - 16 have been used.
    oneof config_item{
        SKFChina.Common.SpecificConfigItem    specific_config_item = 1;
        SKFChina.Common.fSchedulerConfigItem  fscheduler_config_item = 6;
    }
    optional int32                        memory_id = 10;
    oneof config_content{
        bytes                             general_config_content = 2;
        TimeArray                         time_config_content = 3;
        WakeUpToSenseDesc                 measurement_description = 4;
        BoolArray                         bool_config_content = 5;
        uint32                            general_config_content_uint32 = 7;
        int32                             general_config_content_int32 = 8;
        float                             general_config_content_float = 9;
        WorkModePair                      work_mode_content = 11;
        GatewayInfoPair                   gateway_info_content = 12;
        bool                              general_config_content_bool = 13;
        MqttSecTypePair                   mqtt_sec_type = 14;
        IpAddr                            ip_addr = 15;
        ChildrenList                      children_list = 16;
    }
}

// To disseminate the configuration to sensor
message ConfigDisseminate {
    // In the current design: field numbers 1 - 6 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    // The type of product
    SKFChina.Common.ProductType     product = 4;
    // Configuration pair
    repeated ConfigPair             config_pair = 5;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 6;
}

message CommandPair {
    // In the current design: field numbers 1 - 7 have been used.

    SKFChina.Common.Command         command = 1;
    oneof command_para{
        bytes                             general_config_content = 2;
        TimeArray                         time_config_content = 3;
        BoolArray                         bool_config_content = 4;
        uint32                            general_config_content_uint32 = 5;
        int32                             general_config_content_int32 = 6;
        float                             general_config_content_float = 7;
    }
}

// To disseminate the configuration to sensor
message CommandDisseminate {
    // In the current design: field numbers 1 - 6 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    // The type of product
    SKFChina.Common.ProductType     product = 4;
    // Command pair
    CommandPair                     command_pair = 5;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 6;
}
