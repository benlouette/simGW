/**
 * @file    FirmwareUpdateOverTheAir.proto
 * @author  Xiaoyuan (Sean) Ma (ZZ2134)
 * @date    2023-03-11
 * @brief   Define messages for FUOTA
 * @details The firmware update over the air is designed based on Froto.
 * 1) VersionRetrieve: to retrieve the version information. 
 *    Candidate primitives: "simple retrieve"
 * 2) CurrentVersionUpload: to upload the current version information.
 *    Candidate primitives: "simple retrieve" (as a reply of VersionRetrieve), "simple upload", 
 *    or "reliable upload".
 * 3) LastFUOTAUpload: to upload the last FUOTA information (no matter successful or not).
 *    Candidate primitives: "simple retrieve" (as a reply of VersionRetrieve).
 * 4) UpdateStatusUpload: to upload the FUOTA status.
 *    Candidate primitives: "simple upload".
 * 5) FUOTANotifiyDisseminate: to disseminate a notification of FUOTA.
 *    Candidate primitives: "simple disseminate" or "reliable disseminate".
 * 6) FileNotifiyDisseminate: to disseminate a notification of a file to be sent to the sensor.
 *    Candidate promitives: "simple disseminate" or "reliable disseminate" (or reusing as "simple upload"
 *    or "reliable upload").
 * 7) ImageBlockRequest: to request some image blocks (if image dissemination over FROTO supported).
 *    Candidate primitives: "simple request" (or reusing as "simple retrieve").
 * 8) ImageBlockDisseminate: to disseminate image blocks.
 *    Candidate primitives: "simple request" (as a reply of ImageBlockRequest), "simple bulk disseminate", 
 *    or "reliable bulk disseminate" (or reusing as "simple retrieve", "simple bulk upload", or 
 *    "reliable bulk upload").
 * Current version: 1.0c, appVer = 1
 * ChangeLog:
 * V1.0  | 2023-03-15 | Xiaoyuan (Sean) Ma | Draft
 * V1.0a | 2023-07-01 | Xiaoyuan (Sean) Ma | 1. Support other file (e.g., certificate) dissemination
 *                                              a) Add FileNotifiyDisseminate
 *                                              b) Add file_task_id in ImageBlockDisseminate
 *                                           2. Add task_id in ImageBlockRequest
 * V1.0b | 2024-03-06 | Xiaoyuan (Sean) Ma | 1. Add isBLEUart in FUOTAWithFrotoOverBLEOts to indicate 
 *                                              whether is over BLE UART or BLE OTS.
 * V1.0c | 2025-05-12 | Xiaoyuan (Sean) Ma | 1. Modify types of md5_value and sha1_value from string to
 *                                              bytes
 */

syntax="proto3";

import "Common.proto";
import "Froto.proto";

package SKFChina.FirmwareUpdateOverTheAir;

// What to retrieve
enum RetrievePayload {
    // 0 - 2 used
    UNKNOWN_RETRIEVE            = 0;
    CURRENT_VERSION             = 1;
    LAST_FUOTA                  = 2;
}

// The firmware update status
enum UpdateStatus {
    // 0 - 9 used
    UNKNOWN_STATUS              = 0;
    FUOTA_NOTIFICATION_RECEIVED = 1;
    FUOTA_IMAGE_RECEIVING       = 2;
    FUOTA_IMAGE_RECEIVED        = 3;
    FUOTA_IMAGE_CHECKING        = 4;
    FUOTA_IMAGE_VALID           = 6;
    FUOTA_IMAGE_INVALID         = 7;
    FUOTA_SUCCESSFUL            = 8;
    FUOTA_FAIL                  = 9;
}

message UpdateTaskSupplementaryInfo {
    // In the current design: field numbers 1 - 5 have been used.

    // FUOTA task ID
    uint32                        fuota_task_id = 1;
    // When updated (unix timestamp, 0 time zone, unit is ms)
    uint64                        update_time = 2;
    // The update communication method
    SKFChina.Common.CommunicationType update_method = 3;
    // The update type: diff or whole
    SKFChina.Common.FUOTAType     update_type = 4;
    // The image size
    uint32                        update_image_size_bytes = 5;
}

// To retrieve the version information
message VersionRetrieve {
    // In the current design: field numbers 1 - 5 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    RetrievePayload                 payload = 4;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 5;
}

// The retrieve reply for @p CURRENT_VERSION or upload directly the current version information
message CurrentVersionUpload {
    // In the current design: field numbers 1 - 9 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    // The hardware type
    SKFChina.Common.HardwareType    hardware_type = 4;
    // The hardware version
    // (TODO: specify how to convert the hardware version to a uint32 value)
    uint32                          hardware_version = 5;
    // The firmware version = (Major << 16) + (Minor << 8) + (Bugfix)
    uint32                          firmware_version = 6;
    // The gnu build id
    optional uint32                 build_id = 7;
    
    // Some update information of the current version 
    optional UpdateTaskSupplementaryInfo    current_version_supplementary_update_info = 8;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 9;
}

// The retrieve reply for @p LAST_FUOTA
message LastFUOTAUpload {
    // In the current design: field numbers 1 - 9 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    // The hardware type
    SKFChina.Common.HardwareType    hardware_type = 4;
    // The hardware version
    // (TODO: specify how to convert the hardware version to a uint32 value)
    uint32                          hardware_version = 5;
    // The firmware version = (Major << 16) + (Minor << 8) + (Bugfix)
    uint32                          firmware_version = 6;
    // The gnu build id
    optional uint32                 build_id = 7;
    
    // Some update information of the last update
    optional UpdateTaskSupplementaryInfo    last_update_supplementary_info = 8;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 9;
}

// To report the current FUOTA status
message UpdateStatusUpload {
    // In the current design: field numbers 1 - 8 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    // The update status
    UpdateStatus                    update_status = 4;
    // FUOTA task ID
    uint32                          fuota_task_id = 5;
    // Received bytes
    uint32                          received_bytes = 6;
    // Some debug messages can be uploaded
    optional bytes                  debug_messages = 7;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 8;
}

message FUOTAWithHttp {
    // In the current design: field number 1 has been used.
    bytes                           url = 1;
}

message FUOTAWithFrotoOverMqtt {
    // In the current design: field numbers 1 - 2 have been used.
    bytes                           url = 1;
    bytes                           mqtt_topic = 2;
}

message FUOTAWithFrotoOverBLEOts {
    // In the current design: field number 2 has been used.
    // True is BLE UART, otherwise BLE OTS
    bool                            isBLEUart = 2; 

    // TODO: to be designed (if using BLE OTS)
    bytes                           TODO = 1;
}

// The FUOTA notification to the sensor
message FUOTANotifiyDisseminate {
    // In the current design: field numbers 1 - 20 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    // FUOTA task ID
    uint32                          fuota_task_id = 4;
    SKFChina.Common.HardwareType    target_hardware_type = 5;
    // The to-be-updated target hardware version
    // (TODO: specify how to convert the hardware version to a uint32 value)
    uint32                          target_hardware_version = 6;
    // The to-be-updated firmware version
    // The firmware version = (Major << 16) + (Minor << 8) + (Bugfix)
    uint32                          firmware_version = 7;
    // The gnu build id of the to-be-updated firmware
    optional uint32                 build_id = 8;
    // Force to perform the FUOTA no matter the version is later than the current one
    // [default = false]
    bool                            force_fuota = 9;
    // The update communication method
    SKFChina.Common.CommunicationType       update_method = 10;
    // The update type: diff or whole
    SKFChina.Common.FUOTAType       update_type = 11;
    oneof fuota_method {
        FUOTAWithHttp               fuota_with_http = 12;
        FUOTAWithFrotoOverMqtt      fuota_with_froto_over_mqtt = 13;
        FUOTAWithFrotoOverBLEOts    fuota_with_froto_over_ble_ots = 14; // BLE OTS or BLE uart
    }
    // The supplementary information (just in case)
    optional bytes                  supplementary_info = 16;
    // hash value of the image.
    oneof check_value{
        bytes              md5_value = 15; // 32-bit md5
        bytes              sha1_value = 19;
        uint32             elf_hash_value = 20;
    }
    // Encryption: indicate which encryption is adopted for @p ImageBlockDisseminate.image_content.
    optional SKFChina.Common.Encryption     encryp = 17;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 18;
}

// The normal file notification to the sensor
message FileNotifiyDisseminate {
    // In the current design: field numbers 1 - 15 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    SKFChina.Common.FileType        file_type = 4;
    // Task ID
    uint32                          task_id = 5;
    // The update communication method
    SKFChina.Common.CommunicationType       update_method = 6;
    oneof fuota_method {
        FUOTAWithHttp               fuota_with_http = 7;
        FUOTAWithFrotoOverMqtt      fuota_with_froto_over_mqtt = 8;
        FUOTAWithFrotoOverBLEOts    fuota_with_froto_over_ble_ots = 9; // BLE OTS or BLE uart
    }
    // The supplementary information (just in case)
    optional bytes                  supplementary_info = 10;
    // hash value of the image.
    oneof check_value{
        bytes              md5_value = 11; // 32-bit md5
        bytes              sha1_value = 12;
        uint32             elf_hash_value = 13;
    }
    // Encryption: indicate which encryption is adopted for @p ImageBlockDisseminate.image_content.
    optional SKFChina.Common.Encryption     encryp = 14;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 15;
}

// The request reply for @p SPECIFIC_IMAGEBLOCK or disseminate directly image blocks
message ImageBlockDisseminate {
    // In the current design: field numbers 1 - 9 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    // Task ID
    oneof task_id{
        uint32                      fuota_task_id = 4;
        uint32                      file_task_id = 9;
    }
    // offset to the start of the image
    uint32                          offset = 5;
    // The image content
    bytes                           image_content = 6;
    // hash value of the data: elf hash adopted.
    uint32                          hash_value = 7;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 8;
}

// To request a specific block (used for, e.g., some blocks are missed)
message ImageBlockRequest {
    // In the current design: field numbers 1 - 8 have been used.

    SKFChina.Froto.FrotoHeader      header = 1;
    // Application version: so far the supported version is 1
    uint32                          appVer = 2;
    // The sensor ID: considering future applications with a gateway
    bytes                           sensor_id = 3;
    // Offset to the start of the image
    uint32                          offset = 4;
    // The size
    uint32                          size = 5;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool                   is_big_endian = 6;
    oneof task_id{
        uint32                      fuota_task_id = 7;
        uint32                      file_task_id = 8;
    }
}