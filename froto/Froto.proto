/**
 * @file    Froto.proto
 * @author  Xiaoyuan (Sean) Ma (ZZ2134)
 * @date    2023-03-11
 * @brief   Define the Froto protocol
 * @details 10 primitives are defined.
 * Current version: 1.0c, version = 1
 * ChangeLog:
 * V1.0  | 2023-03-11 | Xiaoyuan (Sean) Ma | Draft
 * V1.0a | 2023-11-23 | Xiaoyuan (Sean) Ma | Modify the type of cloud_url in FrotoHeader: 
                                             from bytes to bool to save bytes.
 * V1.0b | 2023-12-12 | Xiaoyuan (Sean) Ma | Make it compatible with V1.0: recover 
                                             cloud_url to bytes and add cloud in peer_addr
                                             of FrotoHeader.
 * V1.0c | 2023-12-21 | Xiaoyuan (Sean) Ma | Add SeqNoElement as the acked message to be 
                                             compatible with the nanopb-based C language 
                                             implementation.
 */

syntax="proto3";
package SKFChina.Froto;

// Type of primitives
enum FrotoPmtType {
    // 0 - 10 used

    UNKNOWN_PRIMITIVETYPE   = 0;
    SIMPLE_UPLOAD           = 1;
    RELIABLE_UPLOAD         = 2;
    SIMPLE_DISSEMINATE      = 3;
    RELIABLE_DISSEMINATE    = 4;
    SIMPLE_BULK_UPLOAD      = 5;
    RELIABLE_BULK_UPLOAD    = 6;
    SIMPLE_BULK_DISSEMINATE = 7;
    RELIABLE_BULK_DISSEMINATE = 8;
    SIMPLE_REQUEST          = 9;
    SIMPLE_RETRIVE          = 10;
}

// Type of messages
enum FrotoMsgType {
    // 0 - 6 used

    UNKNOWN_MESSAGETYPE     = 0;
    NORMAL_MESSAGE          = 1;
    ACK_MESSAGE             = 2;
    REQUEST_MESSAGE         = 3;
    REQUEST_REPLY_MESSAGE   = 4;
    RETRIVE_MESSAGE         = 5;
    RETRIVE_REPLY_MESSAGE   = 6;
}

message SeqNoElement {
    // In the current design: field number 1 has been used.
    uint32                  seqNo = 1;
}

// Froto Header
message FrotoHeader {
    // In the current design: field numbers 1 - 18 have been used.

    // Froto version: so far supported version is 1
    uint32                  version = 1;
    // The sensor ID
    bytes                   sensor_id = 2;
    // The the peer address: cloud/gateway/mobile client ID
    oneof peer_addr{
        bytes               cloud_url = 3;  // Deprecated: to save bytes and would not be used in the future
        bytes               gateway_id = 4;
        bytes               mobile_id = 5;
        bool                cloud = 15;     // The value is true (just to indicate a message to/from cloud)
    }
    // is_up: true representing a up message from the sensor to the peer (e.g., the cloud)
    // Otherwise representing a down message from the peer to the sensor
    // This field is for debugging: ones can use this field to recognize the packet direction by using 
    // debug tools (e.g., an MQTT broker or BLE sniffer)
    bool                    is_up = 6;
    // The sequence number of the message: cyclic increasing 1 for each message
    // For reply or acknolegement: the sequence number increases the received sequence number by 1
    uint32                  message_seq_no = 7;
    // Time to live of the message: a downcounter to indicate how many attempts remain
    // If the message is sent for the first time, time_to_live is the max attempts.
    // If the message is repeated, @p message_seq_no also should increase by 1 and @p time_to_live 
    // should decrease by 1.
    // [default = 3]
    uint32                  time_to_live = 8;
    // The primitive type: indicating which primitive this message belongs to
    // [default = SIMPLE_UPLOAD]
    FrotoPmtType            primitive_type = 9;
    // The message type: indicating which type message is in the primitive
    // [default = NORMAL_MESSAGE]
    FrotoMsgType            message_type = 10;
    // The number of total blocks: used for large object transfer (i.e., the packet split case)
    // Set to 1 if no packet split.
    // [default = 1]
    uint32                  total_block = 11;
    // The ID of a long packet: recommand to use the messaeg_seq_no of the first block of a long packet as the ID 
    // of a long packet, only required in the packet split case
    uint32                  long_packet_id = 14;
    // The current blocks: only required in the packet split case
    optional uint32         current_block = 16;
    // True if big endian
    // Little endian used if this field is abscent
    optional bool           is_big_endian = 17;
    // The ack indicator: to indicate which packets have been received (only valid when
    // @p message_type is @p ACK_MESSAGE)
    // If this field is not included, an acknowledgement message indicates that message of 
    // (@p message_seq_no - 1) is received
    // acked_message_seq_no would be deprecated due to the incompatibility with nanopb-based C language
    // implementation.
    // Recommand using acked_message_seq_number.
    repeated uint32         acked_message_seq_no = 12; // Deprecated
    repeated SeqNoElement   acked_message_seq_number = 18;
    // For @p RELIABLE_BULK_UPLOAD and @p RELIABLE_BULK_DISSEMINATE, @p ack_window defines at most 
    // how many packets sent should have an acknowledgement. 
    // For instance, for @p RELIABLE_BULK_UPLOAD, and @p ack_window is set to 5, if there is no acknowledgement
    // received after five uplooading packets sent, then the sending failed and the five packets would be repeated
    // again.
    // [default = 1]
    optional uint32         ack_window_size_message = 13;
}

// The acknowledgement message independent of applications
message FrotoAckMsg {
    // In the current design: field number 1 has been used.

    FrotoHeader             header = 1;       // Froto version
}
