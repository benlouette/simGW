// Unit: the unit of the uploading data
enum Unit {
    // 0 - 23 used
    UNKNOWN_UNIT = 0;

    // Acceleration
    MPERS2 = 1; // m/s2
    GEE = 2;    // g

    // Temperature
    FDEGREE = 3;// Fahrenheit 
    CDEGREE = 4;// Celsius 

    // Voltage
    VOLT = 5;// V
    MILLIVOLT = 15;// mV

    // Energy and power
    COULOMB = 6;// Coulomb
    JOULE = 7;  // Joule
    MAH = 8;    // Milliamp hours

    // Speed and frequency
    KMPERH = 11; // km/h
    MPERS = 12; // m/s
    RPM = 13; // rpm
    HZ = 14; // Hz

    // Velocity
    MMPERS = 23; // mm/s

    // Time
    TIME_SECOND = 16;
    TIME_MINUTE = 17;
    TIME_HOUR = 18;
    TIME_MILLISECOND = 19;

    // Ratio
    DB = 20;
    DBM = 21;

    // Communication
    KBPS = 22; // kbps

    // Others
    NOUNIT = 9; // No unit, e.g., the reading from an ADC
    PERCENTAGE = 10; // For relative values, e.g., relative humidity
}

// Range: the range of sensor
// So far, only range of accelerometer is enumerated.
enum Range {
    // 0 - 6, 15, 30, 60 used
    UNKNOWN_RANGE = 0;
    RANGE_2G = 1; // +-2 G
    RANGE_4G = 2; // +-4 G
    RANGE_8G = 3; // +-8 G
    RANGE_16G = 4; // +-16 G
    RANGE_32G = 5; // +-32 G
    RANGE_64G = 6; // +-64 G
    RANGE_15G = 15; // +-15 G
    RANGE_30G = 30; // +-30 G
    RANGE_60G = 60; // +-60 G
}

// Format: the format of the (before encoded and after decoded) data (e.g., uint16_t or float32_t)
// Here the endianess should be assigned.
// Given a value 0xaabbccdd, for little endian, memory from low address to high is 0xdd 0xcc 0xbb 0xaa
// for big endian, memory from low address to high is 0xaa 0xbb 0xcc 0xdd
enum Format {
    // 0 - 8 used
    UNKNOWN_FORMAT = 0;

    // Integers
    FORMAT_UINT16 = 1; // uint16_t, unsigned, bit width 2 bytes
    FORMAT_INT16 = 2; // int16_t, signed, bit width 2 bytes
    FORMAT_UINT32 = 3; // uint32_t, unsigned, bit width 4 bytes
    FORMAT_INT32 = 4; // int32_t, signed, bit width 4 bytes
    FORMAT_UINT8 = 5; // uint8_t, unsigned, bit width 1 byte
    FORMAT_INT8 = 6; // int8_t, signed, bit width 1 byte

    // Values with decimal fractions
    FORMAT_FLOAT32 = 7; // float32_t, signed, bit width 4 bytes
    FORMAT_DOUBLE64 = 8; // double64_t, signed, bit width 8 bytes
}

