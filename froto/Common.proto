enum Dimension {
    // Mask
    // 0, 1, 2, 4 used
    UNKNOWN_DIMENSION = 0;
    DIMENSION_X = 1;    // e.g., roll
    DIMENSION_Y = 2;    // e.g., pitch
    DIMENSION_Z = 4;    // e.g., yaw
}

// The alarm events
enum AlarmAndNotify {
    // 0 - 8 used
    UNKNOWN_ALARM_EVENT             = 0;
    // Alarm for temperature is higher than TEMPERATURE_ALARM_THRESHOLD_CDGREE
    TEMPERATURE_HIGH_ALARM_EVENT    = 1;
    // Alarm for relative humidity is higher than HUMIDITY_ALARM_THRESHOLD_PERCENTAGE
    HUMIDITY_HIGH_ALARM_EVENT = 2;
    // Alarm for acceleration in X direction is higher than ACC_SENSOR_ALARM_X_THRESHOLD_G
    ACC_X_HIGH_ALARM_EVENT    = 3;
    // Alarm for acceleration in Y direction is higher than ACC_SENSOR_ALARM_Y_THRESHOLD_G
    ACC_Y_HIGH_ALARM_EVENT    = 4;
    // Alarm for acceleration in Z direction is higher than ACC_SENSOR_ALARM_Z_THRESHOLD_G
    ACC_Z_HIGH_ALARM_EVENT    = 5;
    // Alarm for remaining battery capacity is lower than BATTERY_LOW_ALARM_THRESHOLD_PERCENTAGE
    BATTERY_LOW_ALARM_EVENT   = 6;
    // Alarm for anomaly detected
    BEARING_ANOMALY_EVENT     = 7;

    // Notification for remaining battery capacity is full
    // (i.e., higher than than BATTERY_FULL_NOTIFY_THRESHOLD_PERCENTAGE)
    BATTERY_FULL_NOTIFY_EVENT = 8;
}

