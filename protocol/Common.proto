syntax = "proto3";

package SKF.common;

message Header {
    uint32 version = 1;
    uint32 message_id = 2;          /* Message id is used to identify a message in case of request/answer */
    uint32 current_fragment = 4;    /* Used if a message is on multiple frame */
    uint32 total_fragments = 5;     /* Used if a message is on multiple frame */
}

message Ack {
    bool ack = 1; /* true ACK, false NACK */
    uint32 error_code = 2; /* 0 means no error */
}

message Error {
    uint32 error_code = 1;
}