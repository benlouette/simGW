syntax = "proto3";

package SKF.Measurement;

/*******************************************************************************
  *
  * Enum part
  *
  */

enum MeasurementType {
    MeasurementTypeUnknown = 0;
    /* overall */
    MeasurementTypeAccelerationOverall = 1;
    MeasurementTypeVelocityOverall = 2;
    MeasurementTypeEnveloper3Overall = 3;
    MeasurementTypeTemperatureOverall = 4;
    /* twf */
    MeasurementTypeAccelerationTwf = 5;
    MeasurementTypeVelocityTwf = 6;
    MeasurementTypeEnveloper3Twf = 7;
}

enum DataType {
    Unknown = 0;
    U8 = 1;
    S8 = 2;
    U16 = 3;
    S16 = 4;
    U32 = 5;
    S32 = 6;
    F32 = 7;
}

/*******************************************************************************
  *
  * Request
  *
  */

message measurementType {
    MeasurementType measurement_type = 1;
}

message measurementRequest {
    repeated measurementType measurement = 1;
}

/*******************************************************************************
  *
  * Request
  *
  */

message MetadataElo {
    MeasurementType vibration_path = 1;
    uint32 duration = 3;
}

/* create a over load message for future */
message Metadata {
    oneof kind {
        MetadataElo elo_metadata = 1;
    }
}

message MetadataEloTwf {
    uint32 twf_hash = 1;
    uint32 sampling_rate = 2;
    DataType data_type = 3;
}

message MetadataTwf {
    oneof kind {
        MetadataEloTwf elo_metadata_twf = 1;
    }
}

message MeasurementOveralls {
    uint32 peak2peak = 1;
    uint32 rms = 2;
    uint32 peak = 3;
    uint32 std = 4;
    sint32 mean = 5;
}

message MeasurementDataContent {
    oneof kind {
        bytes data_bytes = 1;
        int32 int32_data = 2;
        MeasurementOveralls measurement_overall = 3;
    }
}

// Measurement is compose of specific metadata and data
message MeasurementData {
    optional Metadata metadata = 1;
    optional MetadataTwf metadata_twf = 2;
    MeasurementDataContent data = 3;
}

message CommonMetaData {
    // Unix time (seconds)
    uint64 time = 1;
    // Hash of the configuration used for measurement
    uint32 config_hash = 2;
}

message SendMeasurement {
    optional CommonMetaData common_meta_data = 1;
    repeated MeasurementData measurement_data = 2;
}